<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CineMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --cream: #f7f0e6; --warm1: #e8d5b7; --warm2: #d4b896;
  --amber: #c8903a; --rust: #c0522a; --ink: #2d1f0f;
  --ink2: #4a3520; --muted: #9a7d60; --card: #faf4ea;
  --shadow: rgba(60,30,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
header{padding:40px;border-bottom:1px solid var(--warm2);display:flex;align-items:center;gap:16px;}
.logo{width:48px;height:48px;background:var(--amber);border-radius:12px;display:grid;place-items:center;font-size:22px;}
h1{font-family:'Playfair Display',serif;font-size:36px;}
p.sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
main{max-width:1100px;margin:0 auto;padding:40px 32px;}
.panel{background:var(--card);border:1px solid var(--warm1);border-radius:20px;padding:36px;margin-bottom:36px;box-shadow:0 2px 20px var(--shadow);}
.tabs{display:flex;gap:8px;margin-bottom:28px;}
.tab{padding:10px 22px;border-radius:50px;border:1.5px solid var(--warm2);background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s;}
.tab:hover{border-color:var(--amber);}
.tab.active{background:var(--amber);border-color:var(--amber);color:#fff;}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:24px;}
.field{display:flex;flex-direction:column;gap:8px;}
label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
input,select{padding:12px 16px;border:1.5px solid var(--warm2);border-radius:10px;background:var(--cream);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--amber);}
.slider-wrap{display:flex;align-items:center;gap:12px;}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--warm2);border-radius:4px;border:none;padding:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--amber);border:2px solid #fff;cursor:pointer;}
.sval{font-size:14px;font-weight:500;color:var(--amber);min-width:20px;text-align:center;}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;background:linear-gradient(135deg,var(--amber),var(--rust));color:#fff;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;box-shadow:0 6px 20px rgba(200,144,58,.35);transition:transform .2s,box-shadow .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(200,144,58,.45);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.results-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;}
.results-hdr h2{font-family:'Playfair Display',serif;font-size:26px;}
.meta{font-size:13px;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;}
.card{background:var(--card);border:1px solid var(--warm1);border-radius:16px;padding:22px;box-shadow:0 2px 12px var(--shadow);position:relative;transition:transform .25s,box-shadow .25s;animation:fadeUp .4s ease both;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(60,30,0,.16);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--amber),var(--rust));border-radius:16px 16px 0 0;}
.rank{position:absolute;top:14px;right:14px;width:30px;height:30px;background:var(--warm1);border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:600;color:var(--muted);}
.ctitle{font-family:'Playfair Display',serif;font-size:17px;line-height:1.3;margin-bottom:6px;padding-right:34px;}
.cmeta{font-size:12px;color:var(--muted);margin-bottom:10px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.tag{padding:3px 10px;background:var(--warm1);border-radius:20px;font-size:11px;font-weight:500;color:var(--muted);}
.desc{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.foot{display:flex;align-items:center;justify-content:space-between;}
.stars span{font-size:13px;color:var(--warm2);}
.stars span.on{color:var(--amber);}
.rnum{font-size:13px;font-weight:500;color:var(--ink2);margin-left:5px;}
.pill{padding:4px 12px;border-radius:20px;background:linear-gradient(135deg,var(--amber),var(--rust));color:#fff;font-size:12px;font-weight:500;}
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty .icon{font-size:48px;margin-bottom:12px;}
.ac-wrap{position:relative;}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1.5px solid var(--warm2);border-radius:10px;max-height:220px;overflow-y:auto;z-index:999;box-shadow:0 8px 24px var(--shadow);display:none;}
.di{padding:10px 16px;font-size:14px;cursor:pointer;}
.di:hover,.di.focused{background:var(--warm1);}
#results{opacity:0;transform:translateY(20px);transition:opacity .4s,transform .4s;}
#results.show{opacity:1;transform:none;}
</style>
</head>
<body>
<header>
  <div class="logo">&#127916;</div>
  <div>
    <h1>CineMatch</h1>
    <p class="sub">Movie Recommendation Engine</p>
  </div>
</header>
<main>
  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="setMethod('content')">🎭 Content-Based</button>
      <button class="tab" onclick="setMethod('collab')">👥 Collaborative</button>
      <button class="tab" onclick="setMethod('hybrid')">🔀 Hybrid</button>
    </div>
    <div class="row">
      <div class="field" id="title-field">
        <label>Movie You Liked</label>
        <div class="ac-wrap">
          <input id="movie-input" type="text" placeholder="e.g. Inception" autocomplete="off" oninput="onInput(event)" onkeydown="onKey(event)"/>
          <div class="dropdown" id="dd"></div>
        </div>
      </div>
      <div class="field" id="user-field" style="display:none">
        <label>Your User ID</label>
        <select id="user-select"></select>
      </div>
      <div class="field">
        <label>Results</label>
        <div class="slider-wrap">
          <input type="range" id="topn" min="3" max="10" value="6" oninput="document.getElementById('sv').textContent=this.value"/>
          <span class="sval" id="sv">6</span>
        </div>
      </div>
    </div>
    <button class="btn" onclick="go()">
      <span id="blabel">Get Recommendations</span>
      <span class="spinner" id="spin"></span>
    </button>
  </div>
  <div id="results">
    <div class="results-hdr">
      <h2 id="rtitle">Recommendations</h2>
      <span class="meta" id="rmeta"></span>
    </div>
    <div class="grid" id="grid">
      <div class="empty"><div class="icon">🍿</div><p>Your picks will appear here.</p></div>
    </div>
  </div>
</main>
<script>
const MOVIES = __MOVIES__;
const USERS  = __USERS__;
let method = 'content', focus = -1;

// populate user select
const sel = document.getElementById('user-select');
USERS.forEach(u => { const o = document.createElement('option'); o.value=u; o.textContent='User '+u; sel.appendChild(o); });

function setMethod(m){
  method = m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['content','collab','hybrid'][i]===m));
  document.getElementById('title-field').style.display = m==='collab' ? 'none' : '';
  document.getElementById('user-field').style.display  = m==='content' ? 'none' : '';
}

function onInput(e){
  const q=e.target.value.toLowerCase().trim(), dd=document.getElementById('dd');
  if(!q){dd.style.display='none';return;}
  const m=MOVIES.filter(x=>x.toLowerCase().includes(q)).slice(0,8);
  if(!m.length){dd.style.display='none';return;}
  dd.innerHTML=m.map((x,i)=>`<div class="di" data-i="${i}" onclick="pick('${x.replace(/'/g,"\\'")}')">${x.replace(new RegExp('('+q+')','gi'),'<b style="color:var(--amber)">$1</b>')}</div>`).join('');
  dd.style.display='block'; focus=-1;
}
function onKey(e){
  const items=document.querySelectorAll('.di');
  if(!items.length) return;
  if(e.key==='ArrowDown'){focus=Math.min(focus+1,items.length-1);hiFocus(items);e.preventDefault();}
  if(e.key==='ArrowUp'){focus=Math.max(focus-1,0);hiFocus(items);e.preventDefault();}
  if(e.key==='Enter'&&focus>=0) items[focus].click();
  if(e.key==='Escape') document.getElementById('dd').style.display='none';
}
function hiFocus(items){items.forEach((it,i)=>it.classList.toggle('focused',i===focus));}
function pick(t){document.getElementById('movie-input').value=t;document.getElementById('dd').style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap')) document.getElementById('dd').style.display='none';});

async function go(){
  const btn=document.getElementById('blabel'), sp=document.getElementById('spin');
  if(method!=='collab'&&!document.getElementById('movie-input').value.trim()){
    document.getElementById('movie-input').style.borderColor='var(--rust)';
    setTimeout(()=>document.getElementById('movie-input').style.borderColor='',1200); return;
  }
  btn.textContent='Finding films...'; sp.style.display='block';
  document.getElementById('grid').innerHTML='<div class="empty"><div class="icon">⏳</div><p>Searching...</p></div>';
  const body={method,title:document.getElementById('movie-input').value.trim(),user_id:parseInt(sel.value),top_n:parseInt(document.getElementById('topn').value)};
  try{
    const r=await fetch('/api/recommend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    btn.textContent='Get Recommendations'; sp.style.display='none';
    const rs=document.getElementById('results');
    rs.classList.add('show');
    if(!d.success||!d.results.length){
      document.getElementById('grid').innerHTML='<div class="empty"><div class="icon">😔</div><p>'+(d.error||'No results found.')+'</p></div>'; return;
    }
    document.getElementById('rtitle').textContent={content:'Content-Based',collab:'Collaborative',hybrid:'Hybrid'}[d.method]+' Recommendations';
    document.getElementById('rmeta').textContent=d.results.length+' films found';
    document.getElementById('grid').innerHTML=d.results.map(buildCard).join('');
  }catch(err){
    btn.textContent='Get Recommendations'; sp.style.display='none';
    document.getElementById('grid').innerHTML='<div class="empty"><div class="icon">❌</div><p>Server not running. Run python app.py first.</p></div>';
  }
}

function buildCard(m,i){
  const full=Math.round(m.rating/2);
  const stars=Array.from({length:5},(_,j)=>`<span class="${j<full?'on':''}">★</span>`).join('');
  const tags=m.genres.split(' / ').map(g=>`<span class="tag">${g}</span>`).join('');
  return `<div class="card" style="animation-delay:${i*60}ms">
    <div class="rank">${i+1}</div>
    <div class="ctitle">${m.title}</div>
    <div class="cmeta">${m.year} · ${m.director}</div>
    <div class="tags">${tags}</div>
    <div class="desc">${m.description}</div>
    <div class="foot">
      <div style="display:flex;align-items:center"><div class="stars">${stars}</div><span class="rnum">${m.rating}</span></div>
      <div class="pill">Match ${m.score}</div>
    </div>
  </div>`;
}
</script>
</body>
</html>
